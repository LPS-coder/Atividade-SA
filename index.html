<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - OmniRail</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

  <div class="login-box">


    <img src="img/logo.png" alt="Logo OmniRail" class="logo">

    <p class="subtitle">Plataforma de Monitoramento Ferroviário</p>

    <button class="fake-btn">Entrar</button>


    <form id="loginForm">

      <div class="mb-3">
        <label>E-mail</label>
        <input type="email" id="email" class="form-control">
      </div>

      <div class="mb-3">
        <label>Senha</label>
        <input type="password" id="senha" class="form-control">
      </div>

      <button type="submit" class="btn-login">
        Entrar
      </button>

      <div class="erro" id="erro">
        Preencha todos os campos!
      </div>

    </form>

  </div>

</body>
</html>
