<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniRail - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body id="body-login">
    <div class="login-box">
        <img src="../assets/images/omnirail.png" alt="Logo" class="logo">
        <p class="subtitle">Plataforma de Monitoramento Ferroviário</p>

        <button class="btn btn-secondary w-100">Entrar</button>

        <div class="mb-3 text-start">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control">
        </div>

        <div class="mb-4 text-start">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control">
        </div>

        <button class="btn btn-danger w-100">Entrar</button>
    </div>
</body>
</html>
